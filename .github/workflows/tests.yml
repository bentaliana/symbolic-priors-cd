name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Clone DAGMA source
        run: git clone --depth 1 https://github.com/kevinsbello/dagma external/source_inspection/dagma

      - name: Clone DCDI source
        run: git clone --depth 1 https://github.com/slachapelle/dcdi external/source_inspection/dcdi

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
          pip install -e ".[dev]" --no-deps

      - name: Verify imports
        run: python -c "import symbolic_priors_cd, dagma, gadjid, torch, numpy, scipy, networkx, pandas, matplotlib"

      - name: Run pytest
        run: pytest -q
